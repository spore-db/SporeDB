name: Feature Request
description: Suggest a new feature for SporeDB
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Help us understand what you need.
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? How would you use it in your bioprocess workflow?
    validations:
      required: true
  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API
      description: How do you imagine this would look in code? (optional)
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or other tools have you tried?

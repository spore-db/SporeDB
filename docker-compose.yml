services:
  sporedb:
    build: .
    ports:
      - "8000:8000"
    environment:
      SPOREDB_DATABASE_URL: postgresql+asyncpg://sporedb:sporedb@postgres:5432/sporedb
      SPOREDB_S3_ENDPOINT: http://minio:9000
      SPOREDB_S3_ACCESS_KEY: minioadmin
      SPOREDB_S3_SECRET_KEY: minioadmin
      SPOREDB_S3_BUCKET: sporedb
      SPOREDB_S3_REGION: us-east-1
      SPOREDB_JWT_SECRET_KEY_PATH: keys/cloud_private.pem
      SPOREDB_JWT_PUBLIC_KEY_PATH: keys/cloud_public.pem
      SPOREDB_JWT_ALGORITHM: EdDSA
      SPOREDB_DEBUG: "true"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./keys:/home/sporedb/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sporedb
      POSTGRES_PASSWORD: sporedb
      POSTGRES_DB: sporedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sporedb"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  minio_data:

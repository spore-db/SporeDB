app = "sporedb"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  SPOREDB_MODE = "selfhosted"
  SPOREDB_SERVER_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

timestamp_field: "analysis_date"
variable_mappings:
  - source: "result_value"
    target: "assay_result"
  - source: "titer"
    target: "titer"
    unit: "g/L"
  - source: "viability"
    target: "viability"
    unit: "%"
  - source: "vcd"
    target: "viable_cell_density"
    unit: "cells/mL"
  - source: "glucose"
    target: "glucose"
    unit: "g/L"
metadata_mappings:
  sample_id: "lims_sample_id"
  test_name: "assay_method"
external_id_field: "sample_id"

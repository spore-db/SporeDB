timestamp_field: "created_at"
variable_mappings:
  - source: "titer"
    target: "titer"
    unit: "g/L"
  - source: "viability"
    target: "viability"
    unit: "%"
  - source: "cell_count"
    target: "viable_cell_density"
    unit: "cells/mL"
  - source: "optical_density"
    target: "optical_density"
  - source: "ph"
    target: "ph"
metadata_mappings:
  experiment_name: "eln_experiment_name"
  task_name: "eln_task_name"
external_id_field: "experiment_id"
